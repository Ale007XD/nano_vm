name: Log activity to nano-vm-ip

on:
  push:
    branches: ['**']
  pull_request:
    types: [closed]

jobs:
  log-to-ip:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare log entry
        id: log
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${{ github.ref_name }}"
          BASE_DIR="projects-logs/${REPO_NAME}"
          BRANCH_DIR="${BASE_DIR}/${BRANCH}"

          # Единый формат даты UTC
          DATE="$(date -u +"%Y-%m-%d %H:%M:%S")"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            SHA="${{ github.sha }}"
            # Явно получаем информацию по SHA
            MSG="$(git show -s --format=%s "$SHA")"
            AUTHOR="$(git show -s --format=%an "$SHA")"
            TYPE="Commit"
            LINK="https://github.com/${{ github.repository }}/commit/${SHA}"
          else
            # Для PR – используем merge_commit_sha или последний коммит PR
            SHA="${{ github.event.pull_request.merge_commit_sha }}"
            if [[ -z "$SHA" ]]; then
              SHA="${{ github.event.pull_request.head.sha }}"
            fi
            MSG="Merged PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            AUTHOR="${{ github.event.pull_request.user.login }}"
            TYPE="PR Merge"
            LINK="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          fi

          # Безопасное создание файла через printf (избегаем проблем со спецсимволами)
          printf "# %s | %s\n**%s**\n%s\n[→ Link](%s)\n---\n" \
            "$DATE" "$TYPE" "$AUTHOR" "$MSG" "$LINK" > /tmp/log_entry.md

          echo "branch_dir=${BRANCH_DIR}" >> $GITHUB_OUTPUT
          echo "log_file=/tmp/log_entry.md" >> $GITHUB_OUTPUT

      - name: Append log to nano-vm-ip
        run: |
          # Удаляем старую папку, если осталась (на всякий случай)
          rm -rf ip-repo
          git clone https://x-access-token:${{ secrets.nano_vm_ip }}@github.com/Ale007XD/nano-vm-ip.git ip-repo
          cd ip-repo

          BRANCH_DIR="${{ steps.log.outputs.branch_dir }}"
          SOURCE_LOG="${{ steps.log.outputs.log_file }}"

          mkdir -p "${BRANCH_DIR}"
          LOG_FILE="${BRANCH_DIR}/activity-log.md"

          # Добавляем новую запись сверху
          cat "${SOURCE_LOG}" > "${LOG_FILE}.tmp"
          if [[ -f "${LOG_FILE}" ]]; then
            cat "${LOG_FILE}" >> "${LOG_FILE}.tmp"
          fi
          mv "${LOG_FILE}.tmp" "${LOG_FILE}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${LOG_FILE}"

          # Коммитим только если есть изменения
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Log: ${{ github.repository }}/${{ github.ref_name }}"
            git push
          fi
