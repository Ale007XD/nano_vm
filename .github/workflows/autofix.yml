name: Auto-fix Code Style

on:
  # Автозапуск при пуше (но не при пуше от самого себя, благодаря [skip ci])
  push:
    branches-ignore:
      - 'dependabot/**'  # Опционально: игнорировать dependabot
  # Ручной запуск для любой ветки
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run auto-fix on"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # При push берём ветку из события, при dispatch — из input
          ref: ${{ github.event_name == 'push' && github.ref_name || inputs.branch }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: Fix lint issues (safe fixes)
        # || true важен: ruff check --fix возвращает 1, если остались ошибки вроде E501
        run: ruff check . --fix || true

      - name: Format code (fix line lengths & style)
        run: ruff format .

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # [skip ci] критически важен — предотвращает бесконечный цикл:
          # push → workflow → fix → push → workflow → ...
          commit_message: "style: auto-fix linting [skip ci]"
          # Пушим в ту же ветку, из которой взяли код
          branch: ${{ github.event_name == 'push' && github.ref_name || inputs.branch }}
