name: Auto-fix Code Style

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run auto-fix on"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff  # На случай, если ruff не указан в dev-зависимостях

      - name: Fix lint issues (safe fixes)
        # || true критически важен: ruff check --fix возвращает exit code 1,
        # если остаются ошибки типа E501, которые он не умеет чинить сам.
        # Это не даст воркфлоу упасть до запуска форматтера.
        run: ruff check . --fix || true

      - name: Format code (fix line lengths & style)
        run: ruff format .

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix linting [skip ci]"
