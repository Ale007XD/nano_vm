name: Auto-fix Code Style

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run auto-fix on"
        required: true
        default: "main"
        type: string

# Нужно разрешение на запись, чтобы закоммитить исправления обратно
permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Ruff fixes & format
        run: |
          # 1. Исправляем логику: импорты, неиспользуемые переменные и т.д.
          ruff check . --fix
          # 2. Форматируем код: перенос длинных строк, отступы (решает E501)
          ruff format .

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix linting [skip ci]"
          # [skip ci] критически важен, чтобы не запустить CI в бесконечном цикле
