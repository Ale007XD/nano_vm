name: CI

on:
  push:
    branches: ["main", "v0.7.0"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run CI on"
        required: true
        default: "main"
        type: string
      python_versions:
        description: "Python versions to test (comma-separated)"
        required: false
        default: "3.10,3.11,3.12"
        type: string
      skip_mypy:
        description: "Skip mypy type check"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Resolve: превращает строку "3.10,3.11,3.12" в JSON-массив для матрицы
  # -------------------------------------------------------------------------
  resolve:
    name: Resolve inputs
    runs-on: ubuntu-latest
    outputs:
      python-matrix: ${{ steps.set.outputs.matrix }}
      ref: ${{ steps.set.outputs.ref }}

    steps:
      - name: Build matrix and ref
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSIONS="${{ inputs.python_versions }}"
            REF="${{ inputs.branch }}"          else
            VERSIONS="3.10,3.11,3.12"
            REF="${{ github.ref_name }}"
          fi

          MATRIX=$(echo "$VERSIONS" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          versions = [v.strip() for v in raw.split(',') if v.strip()]
          print(json.dumps(versions))
          ")

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "ref=$REF"       >> "$GITHUB_OUTPUT"

          echo "### CI targets" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`$REF\`"          >> "$GITHUB_STEP_SUMMARY"
          echo "- **Python:** \`$VERSIONS\`"     >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------------
  # Lint: ruff + mypy (один раз, на 3.12)
  # -------------------------------------------------------------------------
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    needs: resolve

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check .

      # 🔧 ВАРИАНТ 2: Явно ставим mypy перед запуском
      - name: Mypy
        if: ${{ github.event.inputs.skip_mypy != 'true' }}
        run: |
          pip install mypy          python -m mypy nano_vm/

  # -------------------------------------------------------------------------
  # Test: pytest на выбранных версиях Python
  # -------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [resolve, lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.resolve.outputs.python-matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest + coverage
        run: |
          pytest \
            --cov=nano_vm \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            tests/

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
