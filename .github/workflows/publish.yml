name: Publish nano-vm

on:
  push:
    tags:
      - 'v*' # Срабатывает на любой тег версии

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    outputs:
      is_rc: ${{ steps.check-tag.outputs.rc }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: python -m pip install build

      - name: Build binary wheel and source tarball
        run: python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Check if tag is Release Candidate
        id: check-tag
        run: |
          if [[ "${{ github.ref_name }}" == *"rc"* ]]; then
            echo "rc=true" >> $GITHUB_OUTPUT
          else
            echo "rc=false" >> $GITHUB_OUTPUT
          fi

  publish-testpypi:
    name: Publish to TestPyPI 🧪
    needs: build
    if: needs.build.outputs.is_rc == 'true'
    runs-on: ubuntu-latest
    environment: release-test
    permissions:
      id-token: write # Необходимо для Trusted Publishing
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI 🚀
    needs: build
    if: needs.build.outputs.is_rc == 'false'
    runs-on: ubuntu-latest
    environment: release-prod
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
