name: Publish nano-vm

on:
  push:
    tags:
      - 'v*' # Запуск при пуше любого тега версии

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    outputs:
      is_rc: ${{ steps.check-tag.outputs.rc }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 🔑 Обязательно: загружает всю историю git для setuptools_scm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: python -m pip install build setuptools_scm

      - name: Check if tag is Release Candidate
        id: check-tag
        run: |
          if [[ "${{ github.ref_name }}" == *"rc"* ]]; then
            echo "rc=true" >> $GITHUB_OUTPUT
          else
            echo "rc=false" >> $GITHUB_OUTPUT
          fi

      - name: Set dynamic version for RC/Test builds
        if: steps.check-tag.outputs.rc == 'true'
        run: |
          # Формируем уникальную версию для каждого запуска CI: <тег>.dev<run_number>
          BASE_VERSION="${{ github.ref_name }}"
          BASE_VERSION="${BASE_VERSION#v}" # убираем префикс 'v'
          UNIQUE_VERSION="${BASE_VERSION}.dev${{ github.run_number }}"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$UNIQUE_VERSION" >> $GITHUB_ENV
          echo "🧪 Test version forced to: $UNIQUE_VERSION"

      - name: Build binary wheel and source tarball
        run: python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI 🧪
    needs: build
    if: needs.build.outputs.is_rc == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true # 🔒 Защита от падения при повторном запуске

  publish-pypi:
    name: Publish to PyPI 🚀
    needs: build
    if: needs.build.outputs.is_rc == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
