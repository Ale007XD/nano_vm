name: Code Query & Export v2.6 (Markdown)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Запрос к кодовой базе'
        required: true
      mode:
        description: 'Режим вывода'
        required: true
        default: 'smart'
        type: choice
        options: [smart, snippets, files, full_project]

  issue_comment:
    types: [created]

jobs:
  intelligent-export:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep jq zip

      - name: LLM Decision (Markdown)
        id: llm
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "🔍 Запрос: ${{ github.event.inputs.query || github.event.comment.body }}"

          cat > prompt.json << 'EOP'
          {
            "model": "qwen/qwen3-coder:free",
            "messages": [
              {
                "role": "system",
                "content": "Ты — помощник по кодовой базе. Отвечай в удобном Markdown. В конце ответа **обязательно** добавь секцию:\n\n**FILES_TO_EXPORT:**\n- path/to/file1.py\n- path/to/file2.py:15-40"
              },
              {
                "role": "user",
                "content": "Запрос: ${{ github.event.inputs.query || github.event.comment.body }}\nРежим: \( {{ github.event.inputs.mode || 'smart' }}\n\nСтруктура проекта:\n \)(cat repo-structure.json 2>/dev/null | head -c 15000 || echo 'Структура проекта пока не сгенерирована')"
              }
            ],
            "temperature": 0.3,
            "max_tokens": 2000
          }
          EOP

          curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-OpenRouter-Title: Code Export v2.6" \
            -H "Content-Type: application/json" \
            -d @prompt.json > raw_response.json

          jq -r '.choices[0].message.content' raw_response.json > agent_plan.md || echo "Ошибка извлечения ответа" > agent_plan.md

      - name: Execute Export
        run: |
          mkdir -p query_result
          cp agent_plan.md raw_response.json query_result/ 2>/dev/null || true

          echo "=== Ответ модели ==="
          head -n 100 agent_plan.md

          # Извлекаем файлы
          > files_to_process.txt
          sed -n '/FILES_TO_EXPORT:/,$p' agent_plan.md | grep '^- ' | sed 's/^- //' | head -15 > files_to_process.txt

          if [[ ! -s files_to_process.txt ]]; then
            echo "⚠️ Fallback поиск"
            rg --files --glob '!.github/**' --glob '!query_result/**' --glob '!node_modules/**' | head -12 > files_to_process.txt
          fi

          echo "📄 Файлы для экспорта:"
          cat files_to_process.txt

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            item=$(echo "$line" | sed 's/^[ -]*//')

            if [[ "$item" == *:* ]]; then
              FILE="${item%%:*}"
              RANGE="${item#*:}"
            else
              FILE="$item"
              RANGE=""
            fi

            if [[ -f "$FILE" ]]; then
              mkdir -p "query_result/$(dirname "$FILE")"
              if [[ "$RANGE" == [0-9]*-[0-9]* ]]; then
                START="${RANGE%-*}"
                END="${RANGE#*-}"
                sed -n "\( {START}, \){END}p" "\( FILE" > "query_result/ \){FILE}.snippet"
                echo "✅ Диапазон \( {START}- \){END} ← $FILE"
              else
                cp "$FILE" "query_result/$FILE"
                echo "✅ Полный файл ← $FILE"
              fi
            fi
          done < files_to_process.txt

          if [[ "${{ github.event.inputs.mode }}" == "full_project" ]]; then
            echo "📦 Создаём full_project.zip..."
            zip -r query_result/full_project.zip . -x "*.git*" "query_result/*" "node_modules/*" "dist/*" "__pycache__/*" > /dev/null
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: query-result-${{ github.run_id }}
          path: query_result/
          retention-days: 14

      - name: Comment result
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync('query_result/agent_plan.md', 'utf8').substring(0, 600);
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**✅ Code Query v2.6 выполнен**\n\n**Запрос:** ${context.payload.comment.body}\n\nРезультаты во вкладке **Artifacts**`
            });
