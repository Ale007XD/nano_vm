name: Code Query & Export v2.6 (Markdown)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Запрос к кодовой базе'
        required: true
      mode:
        description: 'Режим вывода'
        required: true
        default: 'smart'
        type: choice
        options: [smart, snippets, files, full_project]

  issue_comment:
    types: [created]

jobs:
  intelligent-export:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep jq zip

      - name: Download indexes (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: repo-indexes

      - name: LLM Decision (Markdown)
        id: llm
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "🔍 Запрос: ${{ github.event.inputs.query || github.event.comment.body }}"

          cat > prompt.json << 'EOP'
          {
            "model": "qwen/qwen3-coder:free",
            "messages": [
              {
                "role": "system",
                "content": "Ты — помощник по кодовой базе. Отвечай в удобном Markdown. В конце ответа обязательно добавь секцию с файлами в формате:\n\n**FILES_TO_EXPORT:**\n- path/to/file1.py\n- path/to/file2.py:15-40\n- path/to/file3.py"
              },
              {
                "role": "user",
                "content": "Запрос: ${{ github.event.inputs.query || github.event.comment.body }}\nРежим: \( {{ github.event.inputs.mode || 'smart' }}\n\nСтруктура проекта:\n \)(cat repo-structure.json 2>/dev/null | head -c 15000 || echo 'нет структуры')"
              }
            ],
            "temperature": 0.3,
            "max_tokens": 2000
          }
          EOP

          curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-OpenRouter-Title: Code Export v2.6" \
            -H "Content-Type: application/json" \
            -d @prompt.json > raw_response.json

          # Извлекаем текст ответа
          jq -r '.choices[0].message.content' raw_response.json > agent_plan.md
