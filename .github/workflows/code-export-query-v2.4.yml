name: Code Query & Export v2.4 (Ultra Stable)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Запрос к кодовой базе'
        required: true
      mode:
        description: 'Режим вывода'
        required: true
        default: 'smart'
        type: choice
        options: [smart, snippets, files, full_project]

  issue_comment:
    types: [created]

jobs:
  intelligent-export:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep jq zip

      - name: Download indexes (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: repo-indexes

      - name: LLM Decision
        id: llm
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "🔍 Запрос: ${{ github.event.inputs.query || github.event.comment.body }}"

          cat > prompt.json << 'EOP'
          {
            "model": "qwen/qwen3-coder:free",
            "messages": [
              {
                "role": "system",
                "content": "Отвечай СТРОГО только JSON. Никакого markdown, никакого дополнительного текста. Формат: {\"reasoning\": \"...\", \"files_to_export\": [\"path/to/file.py\", \"another/file.py:10-50\", ...]}"
              },
              {
                "role": "user",
                "content": "Запрос: ${{ github.event.inputs.query || github.event.comment.body }}\nРежим: \( {{ github.event.inputs.mode || 'smart' }}\n\nСтруктура проекта:\n \)(cat repo-structure.json 2>/dev/null | head -c 12000 || echo 'нет структуры')"
              }
            ],
            "temperature": 0.2,
            "max_tokens": 1500
          }
          EOP

          curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-OpenRouter-Title: Code Export v2.4" \
            -H "Content-Type: application/json" \
            -d @prompt.json > raw_response.json

          # Супер-устойчивое извлечение
          if jq -e '.choices[0].message.content' raw_response.json > /dev/null 2>&1; then
            jq -r '.choices[0].message.content' raw_response.json > agent_plan.json
          else
            echo '{"reasoning": "Не удалось получить JSON от модели", "files_to_export": []}' > agent_plan.json
          fi

      - name: Execute Export
        run: |
          mkdir -p query_result
          cp agent_plan.json raw_response.json query_result/ 2>/dev/null || true

          echo "=== План агента ==="
          cat agent_plan.json | jq . || echo "JSON не распарсился"

          # === Fallback + обработка ===
          > files_to_process.txt
          jq -r '.files_to_export[]? // empty' query_result/agent_plan.json 2>/dev/null > files_to_process.txt || true

          if [[ ! -s files_to_process.txt ]]; then
            echo "⚠️ Fallback поиск по rg"
            rg --files | head -15 > files_to_process.txt || echo "README.md" > files_to_process.txt
          fi

          echo "Файлы для обработки:"
          cat files_to_process.txt

          # === Безопасная обработка ===
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            item=$(echo "$line" | tr -d '"')

            # Разделяем file:range
            if [[ "$item" == *:* ]]; then
              FILE="${item%%:*}"
              RANGE="${item#*:}"
            else
              FILE="$item"
              RANGE=""
            fi

            if [[ -f "$FILE" ]]; then
              mkdir -p "query_result/$(dirname "$FILE")"

              if [[ -n "$RANGE" && "\( RANGE" =\~ ^[0-9]+-[0-9]+ \) ]]; then
                START="${RANGE%-*}"
                END="${RANGE#*-}"
                sed -n "\( {START}, \){END}p" "\( FILE" > "query_result/ \){FILE}.snippet"
                echo "✅ Диапазон \( {START}- \){END} из $FILE"
              else
                cp "$FILE" "query_result/$FILE"
                echo "✅ Полный файл: $FILE"
              fi
            fi
          done < files_to_process.txt

          if [[ "${{ github.event.inputs.mode }}" == "full_project" ]]; then
            echo "📦 Создаём ZIP всего проекта..."
            zip -r query_result/full_project.zip . -x "*.git*" "query_result/*" "node_modules/*" "dist/*" "__pycache__/*" "*.zip" > /dev/null
          fi

          echo "✅ Workflow завершён успешно"

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: query-result-${{ github.run_id }}
          path: query_result/
          retention-days: 14

      - name: Comment result
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reasoning = "Результат в артефактах";
            try {
              const plan = JSON.parse(fs.readFileSync('query_result/agent_plan.json', 'utf8'));
              reasoning = plan.reasoning || reasoning;
            } catch(e) {}
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**✅ Code Query v2.4**\n\n**Запрос:** ${context.payload.comment.body}\n\n**Рассуждение:** ${reasoning}`
            });
